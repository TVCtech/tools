<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mm to Fractional Inches</title>
<style>
    :root {
        --bg: #f7f8fa;
        --panel: #ffffff;
        --border: #d8dde3;
        --text: #1a1f2b;
        --muted: #5a6470;
        --accent: #2563eb;
        --accent-soft: #e8f0fe;
        --best: #d1f4dd;
        --best-border: #4caf50;
        --code: #f1f3f6;
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        padding: 24px 16px;
    }

    .container {
        max-width: 860px;
        margin: 0 auto;
    }

    h1 {
        font-size: 1.6rem;
        margin: 0 0 4px 0;
    }

    .subtitle {
        color: var(--muted);
        margin: 0 0 24px 0;
        font-size: 0.95rem;
    }

    .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 16px;
    }

    .row {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 16px;
        margin-bottom: 12px;
    }

    @media (max-width: 600px) {
        .row { grid-template-columns: 1fr; }
    }

    label {
        display: block;
        font-size: 0.85rem;
        color: var(--muted);
        margin-bottom: 4px;
        font-weight: 500;
    }

    input[type="text"],
    input[type="number"],
    select,
    textarea {
        width: 100%;
        padding: 8px 10px;
        font-size: 0.95rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: white;
        color: var(--text);
        font-family: inherit;
    }

    input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
    }

    textarea {
        resize: vertical;
        min-height: 60px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .help {
        font-size: 0.8rem;
        color: var(--muted);
        margin-top: 4px;
    }

    .results-section {
        margin-top: 8px;
    }

    .group-header {
        font-size: 1.1rem;
        font-weight: 600;
        margin: 16px 0 8px 0;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--border);
    }

    .group-header .input-mm {
        color: var(--accent);
    }

    table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
    }

    th {
        text-align: left;
        padding: 8px 10px;
        font-weight: 600;
        color: var(--muted);
        border-bottom: 1px solid var(--border);
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.03em;
    }

    td {
        padding: 8px 10px;
        border-bottom: 1px solid var(--border);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    tr.best td {
        background: var(--best);
    }

    tr.best td:first-child {
        border-left: 3px solid var(--best-border);
    }

    .fraction-cell {
        font-weight: 600;
        font-size: 1rem;
    }

    .badge {
        display: inline-block;
        padding: 2px 6px;
        font-size: 0.7rem;
        background: var(--best-border);
        color: white;
        border-radius: 3px;
        margin-left: 6px;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        font-weight: 500;
        letter-spacing: 0.02em;
    }

    .empty {
        color: var(--muted);
        font-style: italic;
        padding: 12px 0;
    }

    .num-right {
        text-align: right;
    }

    .footer-note {
        margin-top: 24px;
        font-size: 0.8rem;
        color: var(--muted);
        text-align: center;
    }
</style>
</head>
<body>
<div class="container">
    <h1>mm to Fractional Inches</h1>
    <p class="subtitle">Find imperial fractional sizes that match a given millimetre value within tolerance.</p>

    <div class="panel">
        <div class="row">
            <div>
                <label for="mmInput">Millimetres</label>
                <textarea id="mmInput" placeholder="e.g. 62 or 50, 65, 77">62</textarea>
                <div class="help">Comma, space or newline separated for multiple values.</div>
            </div>
            <div>
                <label for="toleranceInput">Tolerance (mm)</label>
                <input type="number" id="toleranceInput" value="2" step="0.1" min="0">
                <div class="help">Max allowed difference between mm and fractional inch.</div>
            </div>
            <div>
                <label for="precisionSelect">Precision</label>
                <select id="precisionSelect">
                    <option value="0.5">1/2"</option>
                    <option value="0.25">1/4"</option>
                    <option value="0.125">1/8"</option>
                    <option value="0.0625" selected>1/16"</option>
                    <option value="0.03125">1/32"</option>
                    <option value="0.015625">1/64"</option>
                </select>
                <div class="help">Smallest fractional step to consider.</div>
            </div>
        </div>
    </div>

    <div class="panel results-section" id="resultsPanel">
        <!-- Results render here -->
    </div>

    <div class="footer-note">1 inch = 25.4 mm</div>
</div>

<script>
    const MM_TO_INCHES = 1 / 25.4;

    function gcd(a, b) {
        a = Math.abs(a);
        b = Math.abs(b);
        while (b !== 0) {
            [a, b] = [b, a % b];
        }
        return a;
    }

    function simplifyFraction(num, den) {
        const g = gcd(num, den);
        return { num: num / g, den: den / g };
    }

    function formatFraction(wholeInches, stepIndex, denominator) {
        // stepIndex / denominator is the fractional part
        if (stepIndex === 0) {
            return `${wholeInches}"`;
        }
        if (stepIndex === denominator) {
            // Full inch
            return `${wholeInches + 1}"`;
        }
        const frac = simplifyFraction(stepIndex, denominator);
        if (wholeInches > 0) {
            return `${wholeInches}-${frac.num}/${frac.den}"`;
        }
        return `${frac.num}/${frac.den}"`;
    }

    function allFractionalInches(mm, precision, tolerance) {
        const inches = mm * MM_TO_INCHES;
        const wholeInches = Math.floor(inches);
        const numSteps = Math.round(1 / precision);
        const results = [];

        for (let i = 0; i <= numSteps; i++) {
            const fractionalInch = i * precision;
            const totalInches = wholeInches + fractionalInch;
            const mmEquiv = totalInches / MM_TO_INCHES;
            const mmDifference = Math.abs(mm - mmEquiv);

            if (mmDifference <= tolerance) {
                results.push({
                    fraction: formatFraction(wholeInches, i, numSteps),
                    decimal: totalInches,
                    mmEquiv: mmEquiv,
                    difference: mmDifference,
                    signedDiff: mm - mmEquiv
                });
            }
        }

        // Sort by absolute difference (closest first)
        results.sort((a, b) => a.difference - b.difference);
        return results;
    }

    function parseMmInput(raw) {
        return raw
            .split(/[\s,;]+/)
            .map(s => s.trim())
            .filter(s => s.length > 0)
            .map(s => parseFloat(s))
            .filter(n => !isNaN(n));
    }

    function renderResults() {
        const raw = document.getElementById('mmInput').value;
        const tolerance = parseFloat(document.getElementById('toleranceInput').value);
        const precision = parseFloat(document.getElementById('precisionSelect').value);
        const panel = document.getElementById('resultsPanel');

        const mmValues = parseMmInput(raw);

        if (mmValues.length === 0) {
            panel.innerHTML = '<div class="empty">Enter one or more millimetre values above.</div>';
            return;
        }

        if (isNaN(tolerance) || tolerance < 0) {
            panel.innerHTML = '<div class="empty">Tolerance must be a non-negative number.</div>';
            return;
        }

        let html = '';
        for (const mm of mmValues) {
            const results = allFractionalInches(mm, precision, tolerance);
            html += `<div class="group-header">Results for <span class="input-mm">${mm} mm</span></div>`;

            if (results.length === 0) {
                html += '<div class="empty">No fractional inches found within tolerance.</div>';
                continue;
            }

            html += `
                <table>
                    <thead>
                        <tr>
                            <th>Fractional</th>
                            <th class="num-right">Decimal inches</th>
                            <th class="num-right">mm equivalent</th>
                            <th class="num-right">Difference</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            results.forEach((r, idx) => {
                const isBest = idx === 0;
                const sign = r.signedDiff >= 0 ? '+' : '−';
                const diffStr = `${sign}${Math.abs(r.signedDiff).toFixed(2)} mm`;
                html += `
                    <tr class="${isBest ? 'best' : ''}">
                        <td class="fraction-cell">${r.fraction}${isBest ? '<span class="badge">closest</span>' : ''}</td>
                        <td class="num-right">${r.decimal.toFixed(4)}"</td>
                        <td class="num-right">${r.mmEquiv.toFixed(2)} mm</td>
                        <td class="num-right">${diffStr}</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
        }

        panel.innerHTML = html;
    }

    document.getElementById('mmInput').addEventListener('input', renderResults);
    document.getElementById('toleranceInput').addEventListener('input', renderResults);
    document.getElementById('precisionSelect').addEventListener('change', renderResults);

    // Initial render
    renderResults();
</script>
</body>
</html>
